<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Tektur:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cosmos-bg"></div>
  <div class="stars"></div>
  <div class="scanlines"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
          <circle cx="14" cy="14" r="6" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1"/>
          <circle cx="14" cy="14" r="2.5" fill="#00d4ff"/>
          <line x1="14" y1="2" x2="14" y2="8" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <line x1="14" y1="20" x2="14" y2="26" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <line x1="2" y1="14" x2="8" y2="14" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <line x1="20" y1="14" x2="26" y2="14" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
        </svg>
        <span class="logo-text">DEXVERSE</span>
        <span class="logo-version">v1.0</span>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">INICIO</a>
        <a href="pokedex.html" class="nav-link active">EXPLORAR</a>
        <a href="tipos.html" class="nav-link">TIPOS</a>
        <a href="generaciones.html" class="nav-link">GENERACIONES</a>
        <a href="acerca.html" class="nav-link">ACERCA</a>
        <a href="contacto.html" class="nav-link">CONTACTO</a>
      </nav>
      <div class="status-bar">
        <span class="dot dot-cyan"></span>
        <span class="status-text">EN LÍNEA</span>
      </div>
    </div>
  </header>

  <div class="page-hero-mini">
    <div class="page-tag">BASE DE DATOS</div>
    <h1 class="page-title">EXPLORAR CRIATURAS</h1>
    <p class="page-subtitle">Busca por nombre o número. Filtra por tipo o generación.</p>
  </div>

  <section class="section">
    <div class="controls-bar">
      <div class="search-wrap">
        <span class="search-icon">›</span>
        <input type="text" id="input-buscar" class="search-input" placeholder="Buscar criatura..." oninput="filtrarLocal()">
      </div>
      <select id="select-tipo" class="select-tipo" onchange="filtrarLocal()">
        <option value="">TODOS LOS TIPOS</option>
      </select>
      <select id="select-gen" class="select-tipo" onchange="cambiarGeneracion()">
        <option value="0-151">Gen I — Kanto</option>
        <option value="152-251">Gen II — Johto</option>
        <option value="252-386">Gen III — Hoenn</option>
        <option value="387-493">Gen IV — Sinnoh</option>
        <option value="494-649">Gen V — Unova</option>
        <option value="650-721">Gen VI — Kalos</option>
        <option value="722-809">Gen VII — Alola</option>
        <option value="810-905">Gen VIII — Galar</option>
        <option value="906-1025">Gen IX — Paldea</option>
      </select>
    </div>
    <div class="results-info" id="results-info">Cargando...</div>
    <div class="pokemon-grid" id="grid-pokedex"></div>
    <div class="load-more-wrap">
      <button class="btn btn-outline" id="btn-mas" onclick="mostrarMas()" style="display:none">CARGAR MÁS</button>
    </div>
  </section>

  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)cerrarModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="cerrarModal()">[ ESC ]</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">DEXVERSE</span>
        <span class="footer-tagline">Portal de exploración de criaturas</span>
      </div>
      <div class="footer-links">
        <a href="index.html" class="footer-link">INICIO</a>
        <a href="acerca.html" class="footer-link">ACERCA</a>
        <a href="contacto.html" class="footer-link">CONTACTO</a>
        <span class="footer-copy">No afiliado con Nintendo o Game Freak.</span>
      </div>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script>
    cargarTiposSelect();
    const savedGen = localStorage.getItem('gen');
    if (savedGen) {
      const sel = document.getElementById('select-gen');
      sel.value = savedGen;
      localStorage.removeItem('gen');
    }
    const sel = document.getElementById('select-gen');
    cargarGeneracion(sel.value);
  </script>
</body>
</html>
